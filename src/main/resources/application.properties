# ─────────────────────────────────────────────
# Quiz Leaderboard Configuration
# ─────────────────────────────────────────────

# Set this from your environment before running the app.
# Example (PowerShell): $env:QUIZ_REG_NO="YOUR_ACTUAL_REG_NO"
quiz.reg-no=${QUIZ_REG_NO:}

# API Base URL
quiz.base-url=https://devapigw.vidalhealthtpa.com/srm-quiz-task

# Total number of polls (0 to 9 = 10 polls)
quiz.total-polls=10

# Mandatory delay between polls in milliseconds (5 seconds)
quiz.poll-delay-ms=5000

# Retry each poll index up to this many attempts before aborting the run.
quiz.max-retries-per-poll=5

# Logging
logging.level.com.quiz=INFO
logging.pattern.console=%d{HH:mm:ss} [%level] %msg%n

# Run as a command-line app (no embedded web server / no port binding)
spring.main.web-application-type=none
